# SkyTrack Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: skytrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skytrack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skytrack_prod_password}
      POSTGRES_DB: skytrack
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skytrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: skytrack-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: skytrack-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://skytrack:${DB_PASSWORD:-skytrack_prod_password}@postgres:5432/skytrack
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SERVER_IP: ${SERVER_IP:-192.168.1.100}
      SERVER_PORT: 3001
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Web Server
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: skytrack-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://${SERVER_IP:-192.168.1.100}/api
      NEXT_PUBLIC_SERVER_IP: ${SERVER_IP:-192.168.1.100}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional - can use host nginx instead)
  nginx:
    image: nginx:alpine
    container_name: skytrack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/skytrack.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/var/www/media:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: skytrack-network
