<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SkyTrack - Bakım</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0ea5e9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
.container{text-align:center;padding:40px 24px;max-width:420px}
.icon{font-size:64px;margin-bottom:24px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:28px;font-weight:800;margin-bottom:12px;letter-spacing:-0.5px}
p{font-size:16px;opacity:0.8;line-height:1.6;margin-bottom:8px}
.divider{width:60px;height:3px;background:rgba(255,255,255,0.3);border-radius:2px;margin:24px auto}
.info{font-size:13px;opacity:0.5;margin-top:24px}
.logo{font-size:14px;font-weight:700;opacity:0.4;margin-top:32px;letter-spacing:1px}
</style>
</head>
<body>
<div class="container">
  <div class="icon">🛠️</div>
  <h1>Sistem Bakımda</h1>
  <p>SkyTrack şu anda planlı bakım çalışması nedeniyle geçici olarak kullanıma kapalıdır.</p>
  <div class="divider"></div>
  <p>En kısa sürede tekrar hizmetinizde olacağız.</p>
  <div class="info">Acil durumlarda yöneticinizle iletişime geçiniz.</div>
  <div class="logo">SKYTRACK</div>
</div>
</body>
</html>
